name: "🚀 Trigger AI Agent"

on:
  issues:
    types: [opened, reopened, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to solve (e.g. 94)'
        required: true
        type: string

jobs:
  solve-issue:
    # Only run if 'ai-fix' label is present OR if manually triggered via workflow_dispatch
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event_name == 'issues' && github.event.action != 'labeled' && contains(github.event.issue.labels.*.name, 'onefm_developer')) ||
      (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'onefm_developer')
    
    # Matches your M1 Mac runner labels
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: Debug Environment
        run: |
          echo "🚀 Processing Issue #${{ github.event.issue.number }}"
          echo "📂 Working Directory: $(pwd)"
          echo "👤 Current User: $(whoami)"
          echo "🕒 Time: $(date)"

      - name: Run Pure Google Agent
        run: |
          cd /Users/samdani/Desktop/secure-frappe-pipeline
          
          # Source .env if it exists to load GCP/GitHub secrets local to this Mac
          if [ -f .env ]; then
            echo "📝 Loading environment from .env file..."
            export $(grep -v '^#' .env | xargs)
          fi
          
          # Activate virtual environment
          if [ -d venv ]; then
            source venv/bin/activate
          else
            echo "❌ Error: Virtual environment (venv) not found!"
            exit 1
          fi
          
          # Extract issue number from automated event OR manual input
          ISSUE_NUM="${{ github.event.issue.number }}${{ github.event.inputs.issue_number }}"
          
          if [ -z "$ISSUE_NUM" ]; then
             echo "❌ Error: No issue number found in the event or input."
             exit 1
          fi
          
          echo "🤖 Starting Agent for Issue #$ISSUE_NUM..."
          python -m agent_runner.main --run "Solve GitHub issue #$ISSUE_NUM"
