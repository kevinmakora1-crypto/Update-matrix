name: "🚀 Trigger AI Agent"

on:
  issues:
    types: [opened, reopened, labeled]
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  solve-issue:
    # Only run if 'ai-fix' label is present OR if manually triggered
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'ai-fix'))
    
    # Matches your M1 Mac runner labels
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      - name: Debug Environment
        run: |
          echo "🚀 Processing Issue #${{ github.event.issue.number }}"
          echo "📂 Working Directory: $(pwd)"
          echo "👤 Current User: $(whoami)"
          echo "🕒 Time: $(date)"

      - name: Run Pure Google Agent
        run: |
          cd /Users/samdani/Desktop/secure-frappe-pipeline
          
          # Source .env if it exists to load GCP/GitHub secrets local to this Mac
          if [ -f .env ]; then
            echo "📝 Loading environment from .env file..."
            export $(grep -v '^#' .env | xargs)
          fi
          
          # Activate virtual environment
          if [ -d venv ]; then
            source venv/bin/activate
          else
            echo "❌ Error: Virtual environment (venv) not found!"
            exit 1
          fi
          
          # Extract issue number
          ISSUE_NUM="${{ github.event.issue.number }}"
          if [ -z "$ISSUE_NUM" ]; then
             echo "❌ Error: No issue number found in the event."
             exit 1
          fi
          
          echo "🤖 Starting Agent for Issue #$ISSUE_NUM..."
          python -m agent_runner.main --run "Solve GitHub issue #$ISSUE_NUM"
